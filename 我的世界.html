<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D 网页版我的世界 - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><path d="M10 0v20M0 10h20" stroke="white" stroke-width="2"/></svg>');
            transform: translate(-50%, -50%);
            pointer-events: none;
            mix-blend-mode: difference;
        }
        #instructions {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.7);
            color: white;
            cursor: pointer;
            z-index: 10;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- 准星 -->
    <div id="crosshair"></div>

    <!-- 操作说明遮罩 -->
    <div id="instructions">
        <h1>点击开始游戏</h1>
        <p>W, A, S, D - 移动</p>
        <p>SPACE - 跳跃</p>
        <p>鼠标 - 视角</p>
        <p>左键 - 破坏方块 | 右键 - 放置方块</p>
    </div>

    <!-- 状态信息 -->
    <div id="info">
        方块数: <span id="block-count">0</span>
    </div>

    <!-- 引入 Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let camera, scene, renderer, controls;
        const objects = []; // 存储所有方块用于碰撞检测
        let raycaster;
        
        // 移动变量
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = false;

        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        // 材质和几何体缓存
        let cubeGeo, cubeMaterial;

        init();
        animate();

        function init() {
            // 1. 场景设置
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // 天空蓝
            scene.fog = new THREE.Fog(0x87CEEB, 0, 750);

            // 2. 灯光
            const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 0.75);
            light.position.set(0.5, 1, 0.75);
            scene.add(light);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5); // 模拟太阳
            dirLight.position.set(50, 200, 100);
            scene.add(dirLight);

            // 3. 相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.y = 10;

            // 4. 控制器 (第一人称)
            controls = new PointerLockControls(camera, document.body);

            const instructions = document.getElementById('instructions');
            instructions.addEventListener('click', function () {
                controls.lock();
            });

            controls.addEventListener('lock', function () {
                instructions.style.display = 'none';
            });

            controls.addEventListener('unlock', function () {
                instructions.style.display = 'flex';
            });

            scene.add(controls.getObject());

            // 5. 键盘监听
            const onKeyDown = function (event) {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW': moveForward = true; break;
                    case 'ArrowLeft':
                    case 'KeyA': moveLeft = true; break;
                    case 'ArrowDown':
                    case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight':
                    case 'KeyD': moveRight = true; break;
                    case 'Space': if (canJump === true) velocity.y += 350; canJump = false; break;
                }
            };

            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW': moveForward = false; break;
                    case 'ArrowLeft':
                    case 'KeyA': moveLeft = false; break;
                    case 'ArrowDown':
                    case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight':
                    case 'KeyD': moveRight = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // 6. 射线检测 (用于放置/破坏方块)
            raycaster = new THREE.Raycaster();

            // 7. 创建世界 (方块)
            // 使用程序化生成的纹理，避免加载外部图片导致的跨域问题
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const context = canvas.getContext('2d');
            context.fillStyle = '#5c9c5c'; // 草地颜色
            context.fillRect(0,0,64,64);
            context.fillStyle = '#4a8a4a'; // 纹理细节
            context.fillRect(10,10,44,44);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter; // 像素风格

            cubeGeo = new THREE.BoxGeometry(5, 5, 5);
            cubeMaterial = new THREE.MeshLambertMaterial({ map: texture });

            // 生成地板
            const floorSize = 20;
            for (let x = -floorSize; x < floorSize; x++) {
                for (let z = -floorSize; z < floorSize; z++) {
                    const box = new THREE.Mesh(cubeGeo, cubeMaterial);
                    box.position.set(x * 5, 2.5, z * 5);
                    scene.add(box);
                    objects.push(box);
                }
            }
            document.getElementById('block-count').innerText = objects.length;

            // 8. 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 9. 鼠标点击事件 (交互)
            document.addEventListener('mousedown', onMouseClick);
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseClick(event) {
            if (!controls.isLocked) return;

            // 设置射线从屏幕中心发射
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(objects);

            if (intersects.length > 0) {
                const intersect = intersects[0];
                
                // 距离限制，太远不能操作
                if (intersect.distance > 40) return;

                // 左键 (0) 破坏，右键 (2) 放置
                if (event.button === 0) {
                    // 破坏方块 (不能破坏基岩层，这里简单设定 y=2.5 为基岩)
                    if (intersect.object.position.y > 0) {
                        scene.remove(intersect.object);
                        objects.splice(objects.indexOf(intersect.object), 1);
                        document.getElementById('block-count').innerText = objects.length;
                    }
                } else if (event.button === 2) {
                    // 放置方块
                    const voxel = new THREE.Mesh(cubeGeo, cubeMaterial);
                    // 根据法线方向计算新位置
                    voxel.position.copy(intersect.object.position).add(intersect.face.normal.multiplyScalar(5));
                    // 简单的防穿模检测：如果新位置也是玩家位置，则不放置
                    voxel.position.y = Math.round(voxel.position.y); 
                    scene.add(voxel);
                    objects.push(voxel);
                    document.getElementById('block-count').innerText = objects.length;
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000; // 秒

            if (controls.isLocked === true) {
                // 物理模拟
                velocity.x -= velocity.x * 10.0 * delta; // 摩擦力
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 100.0 * delta; // 重力 (质量 100)

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); // 保证斜向移动速度一致

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                // 简单的地面碰撞检测
                // 射线向下检测
                raycaster.set(controls.getObject().position, new THREE.Vector3(0, -1, 0));
                const intersections = raycaster.intersectObjects(objects);
                const onObject = intersections.length > 0 && intersections[0].distance < 10; // 玩家高度约10

                if (onObject === true) {
                    velocity.y = Math.max(0, velocity.y);
                    canJump = true;
                }

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                controls.getObject().position.y += (velocity.y * delta); // 垂直移动

                // 防止掉出世界
                if (controls.getObject().position.y < -50) {
                    velocity.y = 0;
                    controls.getObject().position.y = 50;
                    controls.getObject().position.x = 0;
                    controls.getObject().position.z = 0;
                }
            }

            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
